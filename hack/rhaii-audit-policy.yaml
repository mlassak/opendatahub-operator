# Audit policy for RHAII RBAC validation.
# Logs all API calls made by the RHAII operator service account.
apiVersion: audit.k8s.io/v1
kind: Policy
rules:
  # Log all calls from the RHAII operator service account at RequestResponse level.
  - level: RequestResponse
    users:
      - "system:serviceaccount:opendatahub-operator-system:opendatahub-operator-controller-manager"
    omitStages:
      - RequestReceived
  # Don't log anything else (keep the log small).
  - level: None
